name: Build iOS IPA

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Signing ──────────────────────────────────────────────────────────
      # Secrets needed in GitHub repo settings:
      #   IOS_CERTIFICATE_P12      — base64 encoded .p12 distribution certificate
      #   IOS_CERTIFICATE_PASSWORD — password for the .p12 file
      #   IOS_PROVISIONING_PROFILE — base64 encoded .mobileprovision file
      #   IOS_KEYCHAIN_PASSWORD    — any random password for the temp keychain

      - name: Install Apple certificate and provisioning profile
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Create temp keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k $KEYCHAIN_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE" | base64 --decode > $PP_PATH
          PP_UUID=$(grep -a -A1 'UUID' $PP_PATH | grep string | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Build IPA (release)
        run: flutter build ipa --release --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: trustbill-ios-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Attach IPA to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/ipa/*.ipa
          name: TrustBill ${{ github.ref_name }}

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true
